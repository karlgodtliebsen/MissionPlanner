name: .NET 10 Mac Catalyst Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-maccatalyst:
    name: Build Mac Catalyst Release
    runs-on: macos-26
    timeout-minutes: 45

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode 26.6
        shell: bash
        run: |
          XCODE_DEVELOPER_DIR="/Applications/Xcode_26.6.app/Contents/Developer"

          if [[ ! -d "$XCODE_DEVELOPER_DIR" ]]; then
            echo "::error::Xcode 26.6 was not found at $XCODE_DEVELOPER_DIR"
            ls -1 /Applications | grep '^Xcode' || true
            exit 1
          fi

          sudo xcode-select --switch "$XCODE_DEVELOPER_DIR"
          echo "DEVELOPER_DIR=$XCODE_DEVELOPER_DIR" >> "$GITHUB_ENV"

          xcodebuild -version
          xcode-select --print-path

      - name: Set up .NET 10 and .NET MAUI for Mac Catalyst
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.302
          workloads: maui-maccatalyst

      - name: Show .NET build environment
        run: |
          dotnet --info
          dotnet workload list

      - name: Restore required workloads
        run: >-
          dotnet workload restore
          src/UI/MissionPlanner.Mac/MissionPlanner.Mac.csproj

      - name: Restore Mac Catalyst application
        run: >-
          dotnet restore
          src/UI/MissionPlanner.Mac/MissionPlanner.Mac.csproj

      - name: Build Mac Catalyst application
        run: >-
          dotnet build
          src/UI/MissionPlanner.Mac/MissionPlanner.Mac.csproj
          --configuration Release
          --framework net10.0-maccatalyst
          --no-restore
          -p:EnableCodeSigning=false
          -p:CreatePackage=false

      - name: Upload Mac Catalyst build
        uses: actions/upload-artifact@v7
        with:
          name: MissionPlanner-MacCatalyst-Release
          path: src/UI/MissionPlanner.Mac/bin/Release/net10.0-maccatalyst/
          if-no-files-found: error
          retention-days: 14

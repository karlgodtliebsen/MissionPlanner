In the original MissionPlanner, in the folder src-v.1.38 in the file MAVLink.cs in the project MAVLink there are a lot of definitions. Are there some missing that we should extract and use in the new MissionPlanner

Worked for 1m 29s
Yes. There are important definitions in the legacy generated MAVLink.cs that the new implementation is currently missing.

The main finding is that the legacy file is not merely old Mission Planner utility code. It contains a generated MAVLink dialect registry with:

Message IDs

CRC-extra values

Minimum payload lengths

Maximum payload lengths

Message structures

MAVLink enums

ArduPilot-specific enums

Command IDs

Capability flags

Vehicle and autopilot types

The legacy registry contains approximately 350 message definitions, while the new CommonMavLinkCrcExtraProvider currently knows only 28 message IDs.

That explains many log entries such as:

Skipping MAVLink frame with unknown CRC extra. MessageId=163
Skipping MAVLink frame with unknown CRC extra. MessageId=168
Skipping MAVLink frame with unknown CRC extra. MessageId=241
Skipping MAVLink frame with unknown CRC extra. MessageId=11030
Most important missing definitions
These should be added soon because they support functionality already being discussed or already visible in your logs.

Firmware and vehicle identity
AUTOPILOT_VERSION          ID 148   CRC 178   length 60–78
AUTOPILOT_VERSION_REQUEST  ID 183   CRC 85    length 2
AUTOPILOT_VERSION is essential for:

Firmware version

Firmware capabilities

Git revision

Board version

Vendor/product IDs

UID and UID2

MAVFTP capability detection

For modern implementations, request message 148 using:

MAV_CMD_REQUEST_MESSAGE
The old AUTOPILOT_VERSION_REQUEST message can still be recognized, but it should not be the primary request mechanism.

Current ArduPilot telemetry already appearing in your logs
AHRS                       ID 163   CRC 127
SIMSTATE                   ID 164   CRC 154
HWSTATUS                   ID 165   CRC 21
RADIO                      ID 166   CRC 21
WIND                       ID 168   CRC 1
VIBRATION                  ID 241   CRC 90
FLIGHT_INFORMATION         ID 264   CRC 49
ESC_TELEMETRY_1_TO_4       ID 11030 CRC 144
At minimum, adding the CRC definitions means these frames can be parsed correctly and passed through as raw messages even before typed decoders are implemented.

Additional sensor messages
SYSTEM_TIME                ID 2     CRC 137
SCALED_IMU                 ID 26    CRC 170
SCALED_IMU2                ID 116   CRC 76
SCALED_IMU3                ID 129   CRC 46
SCALED_PRESSURE2           ID 137   CRC 195
SCALED_PRESSURE3           ID 143   CRC 131
ATTITUDE_QUATERNION        ID 31    CRC 246
HIGHRES_IMU                ID 105   CRC 93
DISTANCE_SENSOR            ID 132   CRC 85
ALTITUDE                   ID 141   CRC 47
AHRS3                      ID 182   CRC 229
WIND_COV                   ID 231   CRC 105
Vehicle state and connection quality
RADIO_STATUS               ID 109   CRC 185
EXTENDED_SYS_STATE         ID 245   CRC 130
BATTERY2                   ID 181   CRC 174
RPM                        ID 226   CRC 207
EFI_STATUS                 ID 225   CRC 208
GENERATOR_STATUS           ID 373   CRC 117
EXTENDED_SYS_STATE is especially useful because it contains landed and VTOL states.

Control and guided-operation messages
SET_MODE                    ID 11    CRC 89
COMMAND_INT                 ID 75    CRC 158
MANUAL_CONTROL              ID 69    CRC 243
RC_CHANNELS_OVERRIDE        ID 70    CRC 124
SET_ATTITUDE_TARGET         ID 82    CRC 49
ATTITUDE_TARGET             ID 83    CRC 22
SET_POSITION_TARGET_LOCAL_NED   ID 84 CRC 143
POSITION_TARGET_LOCAL_NED       ID 85 CRC 140
SET_POSITION_TARGET_GLOBAL_INT  ID 86 CRC 5
POSITION_TARGET_GLOBAL_INT      ID 87 CRC 150
Your encoder currently supports only a very small command subset. These definitions will become relevant once guided control and richer vehicle commands are implemented.

Important enums to adopt
Several legacy enums are directly relevant to current work.

Immediate priority
MAV_TYPE
MAV_AUTOPILOT
MAV_PROTOCOL_CAPABILITY
FIRMWARE_VERSION_TYPE
MAV_COMPONENT
MAV_RESULT
MAV_MODE_FLAG
MAV_STATE
MAV_PARAM_TYPE
MAV_SEVERITY
GPS_FIX_TYPE
MAV_LANDED_STATE
MAV_VTOL_STATE
These should replace raw byte, ushort, and uint values in domain-facing protocol models where practical.

For example, instead of:

public sealed record HeartbeatMessage(
    byte VehicleType,
    byte Autopilot,
    byte BaseMode,
    byte SystemStatus);
prefer protocol-level enums:

public sealed record HeartbeatMessage(
    MavType VehicleType,
    MavAutopilot Autopilot,
    MavModeFlag BaseMode,
    MavState SystemStatus);
You may still keep the raw numeric values where forward compatibility is important, but typed enums improve readability substantially.

Firmware identity
The legacy definitions should include the capability flags needed for logic such as:

var supportsMavFtp =
    capabilities.HasFlag(
        MavProtocolCapability.Ftp);
They are also needed for:

Mission protocol capability

Parameter protocol capability

MAVLink 2 support

FTP support

Terrain support

Flight termination

Compass calibration

Component metadata support

Vehicle-family mapping
MAV_TYPE and MAV_AUTOPILOT should be used to derive:

SysID 1:Copter
SysID 2:Plane
SysID 3:Rover
rather than relying on raw numbers or parameter metadata.

Do not copy the complete legacy file directly
I would not copy the 37,000-line MAVLink.cs into the new project.

There are several reasons:

It is generated code.

It includes many messages and enums you may never use.

Its structure types depend heavily on marshaling and generated layout.

Some definitions may already have changed since its November 20, 2025 generation date.

It mixes common.xml, ardupilotmega.xml, and other dialect material into one enormous class.

It would undermine the cleaner decoder architecture you have built.

The legacy file is an excellent reference and bootstrap source, but it should not become the new architecture.

What should be extracted
I recommend extracting the neutral protocol registry information:

public sealed record MavLinkMessageDefinition(
    uint MessageId,
    string Name,
    byte CrcExtra,
    byte MinimumPayloadLength,
    byte MaximumPayloadLength);
Then maintain a generated registry:

public static class MavLinkMessageRegistry
{
    public static bool TryGet(
        uint messageId,
        out MavLinkMessageDefinition definition);
}
Example entry:

new MavLinkMessageDefinition(
    MessageId: 148,
    Name: "AUTOPILOT_VERSION",
    CrcExtra: 178,
    MinimumPayloadLength: 60,
    MaximumPayloadLength: 78);
The frame parser could then use the same registry for:

CRC-extra lookup

Minimum-length validation

Maximum-length validation

Diagnostic message names

Known-versus-unknown message decisions

That would replace the current hand-written switch:

case MessageIds.Heartbeat:
    crcExtra = 50;
    return true;
with:

public bool TryGetCrcExtra(
    uint messageId,
    out byte crcExtra)
{
    if (MavLinkMessageRegistry.TryGet(
            messageId,
            out var definition))
    {
        crcExtra = definition.CrcExtra;
        return true;
    }

    crcExtra = default;
    return false;
}
Separate registry support from typed decoding
A message can be known to the protocol without having a typed decoder.

That distinction is important.

Currently, an unknown CRC causes the entire frame to be rejected:

Skipping MAVLink frame with unknown CRC extra
With a complete message registry, the frame can be validated and emitted as:

RawMavLinkMessage
even when no specialized decoder exists.

The desired pipeline is:

Known ID and CRC
       ↓
Validate frame
       ↓
Typed decoder exists?
       ├─ Yes → typed message
       └─ No  → RawMavLinkMessage
Not:

No typed decoder or CRC entry
       ↓
Discard frame
Recommended implementation stages
Stage 1: Complete message registry
Generate or extract:

Message ID

Name

CRC extra

Minimum payload length

Maximum payload length

Start with the common and ardupilotmega dialects.

This immediately eliminates most of the false “unknown CRC extra” messages.

Stage 2: Add core enums
Add strongly typed definitions for:

MAV_TYPE
MAV_AUTOPILOT
MAV_COMPONENT
MAV_PROTOCOL_CAPABILITY
FIRMWARE_VERSION_TYPE
MAV_RESULT
MAV_MODE_FLAG
MAV_STATE
MAV_LANDED_STATE
MAV_PARAM_TYPE
MAV_SEVERITY
Stage 3: Implement firmware identity
Add:

AUTOPILOT_VERSION
MAV_CMD_REQUEST_MESSAGE
and the session/domain integration already described in the previous Codex task.

Stage 4: Add decoders by business need
Prioritize:

AUTOPILOT_VERSION
EXTENDED_SYS_STATE
VIBRATION
RADIO_STATUS
HWSTATUS
WIND
AHRS
AHRS3
FLIGHT_INFORMATION
ESC_TELEMETRY_1_TO_4
Do not implement all 350 typed messages preemptively.

One important correction in the current code
The current MessageIds file contains:

public const uint DefaultFallback = 65555;
That is not a MAVLink message ID and should not be treated as one.

A fallback decoder should be represented as decoder behaviour, not as a fictitious wire-protocol message ID.

For example:

RawMavLinkMessageDecoder
should be the final decoder in the chain without requiring a fake message ID.

Overall conclusion
There are definitely useful missing definitions in the legacy MAVLink.cs.

The most valuable material is not the generated C# structs themselves, but:

The complete message registry

CRC extras

Payload lengths

Common MAVLink enums

ArduPilot dialect enums

Command IDs

Capability flags

The highest-priority additions for the current MissionPlanner are:

AUTOPILOT_VERSION
MAV_PROTOCOL_CAPABILITY
FIRMWARE_VERSION_TYPE
MAV_TYPE
MAV_AUTOPILOT
MAV_COMPONENT
MAV_CMD_REQUEST_MESSAGE
EXTENDED_SYS_STATE
VIBRATION
RADIO_STATUS
HWSTATUS
WIND
AHRS/AHRS3
FLIGHT_INFORMATION
ESC telemetry
The cleanest solution is to generate a compact registry and enum set from the official MAVLink XML dialects, using the legacy file as a verification source—not to manually copy the entire legacy generated class.




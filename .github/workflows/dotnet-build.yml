.github/workflows/dotnet-build.yml
The workflow:

Uses Windows because the primary executable is MissionPlanner.WinUI.

Installs .NET 10 and the maui-windows workload.

Restores and builds the WinUI application in Release/x64.

Runs MissionPlanner.Core.Tests.

Runs MissionPlanner.Tests.

Excludes simulator smoke tests and hardware tests.

Has a 30-minute timeout to prevent another indefinitely running CI job.

Does not touch or build src-v.1.38.

It deliberately does not build MissionPlanner.slnx, because that solution also contains Android and Mac Catalyst head projects, which should not all be built by one Windows job.

The workflow uses the current official major releases actions/checkout@v7 and actions/setup-dotnet@v6. The latter supports .NET 10 version expressions and installing workloads directly.

name: .NET 10 Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Windows Release
    runs-on: windows-latest
    timeout-minutes: 30

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET 10 and .NET MAUI for Windows
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x
          workloads: maui-windows

      - name: Restore Windows application
        run: dotnet restore src/UI/MissionPlanner.WinUI/MissionPlanner.WinUI.csproj

      - name: Build Windows application
        run: >-
          dotnet build
          src/UI/MissionPlanner.WinUI/MissionPlanner.WinUI.csproj
          --configuration Release
          --no-restore
          -p:Platform=x64

      - name: Run unit tests
        shell: pwsh
        run: |
          dotnet test src/Tests/MissionPlanner.Core.Tests/MissionPlanner.Core.Tests.csproj --configuration Release --verbosity normal
          dotnet test src/Tests/MissionPlanner.Tests/MissionPlanner.Tests.csproj --configuration Release --verbosity normal

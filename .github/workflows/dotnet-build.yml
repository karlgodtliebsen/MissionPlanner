The implementation brief below deliberately separates the general MAVFTP transport service from fast parameter download. MAVFTP is a MAVLink microservice carried in FILE_TRANSFER_PROTOCOL messages and supports file operations, sessions, retries, acknowledgements, negative acknowledgements, and burst reads. ArduPilot uses it for parameters, logs, missions, rally points, terrain, firmware, and Lua scripts, so a reusable subsystem is the right architectural starting point. 


Revised dispatcher match
A robust single-response match would be:

private bool Matches(
    FileTransferProtocolMessage ftp,
    MavFtpPacket packet,
    MavFtpResponseRegistration registration)
{
    if (ftp.SystemId != registration.Target.SystemId)
    {
        return false;
    }

    if (!EndPointsMatch(
            ftp.EndPoint,
            registration.Target.EndPoint))
    {
        return false;
    }

    if (packet.RequestedOpcode !=
        registration.RequestedOpcode)
    {
        return false;
    }

    if (registration.Session.HasValue
        && packet.Session != registration.Session.Value)
    {
        return false;
    }

    return registration.MultipleResponses
        ? MavFtpSequence.IsInResponseWindow(
            registration.RequestSequence,
            packet.Sequence)
        : MavFtpSequence.MatchesSingleResponse(
            registration.RequestSequence,
            packet.Sequence);
}

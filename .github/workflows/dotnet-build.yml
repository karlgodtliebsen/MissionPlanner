Worked for 25s
There are three different “names” that are easy to mix together:

Vehicle class — Copter, Plane, Rover, Sub

Firmware identity and version — ArduCopter 4.6.2, for example

Flight-controller board model — CubeOrange, Pixhawk 6C, Matek H743, and so on

They come from different places.

1. Determine the vehicle class from HEARTBEAT
You already decode HEARTBEAT. Its relevant fields are:

HeartbeatMessage(
    byte Type,
    byte Autopilot,
    ...
)
For ArduPilot:

Autopilot = MAV_AUTOPILOT_ARDUPILOTMEGA
The type field identifies the vehicle class. For example:

MAV_TYPE_QUADROTOR
MAV_TYPE_HEXAROTOR
MAV_TYPE_FIXED_WING
MAV_TYPE_GROUND_ROVER
MAV_TYPE_SUBMARINE
The heartbeat is explicitly intended to expose both the vehicle type and autopilot type so that the receiving application can adapt its behaviour. 

I would map the detailed MAV_TYPE into both a broad firmware family and a specific frame category:

public enum ArduPilotFirmwareFamily
{
    Unknown,
    Copter,
    Plane,
    Rover,
    Sub,
    Tracker
}

public sealed record VehicleFirmwareIdentity(
    ArduPilotFirmwareFamily Family,
    MavType MavType,
    MavAutopilot Autopilot,
    FirmwareVersion? Version,
    string? GitHash,
    ushort? VendorId,
    ushort? ProductId,
    ulong? HardwareUid);
Example mapping:

private static ArduPilotFirmwareFamily MapFirmwareFamily(
    MavAutopilot autopilot,
    MavType vehicleType)
{
    if (autopilot != MavAutopilot.ArduPilotMega)
    {
        return ArduPilotFirmwareFamily.Unknown;
    }

    return vehicleType switch
    {
        MavType.FixedWing
            => ArduPilotFirmwareFamily.Plane,

        MavType.GroundRover
            => ArduPilotFirmwareFamily.Rover,

        MavType.Submarine
            => ArduPilotFirmwareFamily.Sub,

        MavType.AntennaTracker
            => ArduPilotFirmwareFamily.Tracker,

        MavType.Quadrotor
            or MavType.Coaxial
            or MavType.Helicopter
            or MavType.Hexarotor
            or MavType.Octorotor
            or MavType.Tricopter
            or MavType.Dodecarotor
            or MavType.Decarotor
            => ArduPilotFirmwareFamily.Copter,

        _ => ArduPilotFirmwareFamily.Unknown
    };
}
So in your SITL case:

Autopilot = ArduPilotMega
Type      = Quadrotor
becomes:

Firmware family = ArduCopter
Vehicle type    = Quadrotor
Do not derive this from parameter names or from the displayed product name.

2. Request AUTOPILOT_VERSION
The authoritative message for the firmware version is:

AUTOPILOT_VERSION
Message ID: 148
It contains:

capabilities

flight_sw_version

middleware_sw_version

os_sw_version

board_version

flight_custom_version

vendor_id

product_id

uid

uid2

The MAVLink specification says it should be emitted in response to MAV_CMD_REQUEST_MESSAGE. 

Send:

COMMAND_LONG
command = MAV_CMD_REQUEST_MESSAGE
param1  = 148
Conceptually:

var request = commandEncoder.EncodeRequestMessage(
    targetSystemId: vehicleId.SystemId,
    targetComponentId: vehicleId.ComponentId,
    messageId: MavLinkMessageIds.AutopilotVersion);
ArduPilot 4.0 and newer support requesting individual messages through MAV_CMD_REQUEST_MESSAGE. 

You should request it once after the first valid heartbeat and retry it a few times if necessary.

Decode flight_sw_version
The field is a packed uint:

Byte 3: major
Byte 2: minor
Byte 1: patch
Byte 0: firmware version type
The specification defines it as four bytes:

major.minor.patch.version-type

A decoder can be:

public static FirmwareVersion DecodeFirmwareVersion(uint encoded)
{
    var major = (byte)(encoded >> 24);
    var minor = (byte)(encoded >> 16);
    var patch = (byte)(encoded >> 8);
    var type = (FirmwareVersionType)(byte)encoded;

    return new FirmwareVersion(
        major,
        minor,
        patch,
        type);
}
For example:

0x040602FF
would represent approximately:

4.6.2 + firmware-type byte
Use the actual MAVLink enum constants for the version-type byte rather than hard-coding assumptions.

A useful model is:

public sealed record FirmwareVersion(
    byte Major,
    byte Minor,
    byte Patch,
    FirmwareVersionType Type)
{
    public override string ToString()
    {
        var suffix = Type switch
        {
            FirmwareVersionType.Dev => "-dev",
            FirmwareVersionType.Alpha => "-alpha",
            FirmwareVersionType.Beta => "-beta",
            FirmwareVersionType.ReleaseCandidate => "-rc",
            FirmwareVersionType.Official => string.Empty,
            _ => $"-{Type}"
        };

        return $"{Major}.{Minor}.{Patch}{suffix}";
    }
}
Git revision
flight_custom_version is eight bytes and is commonly used for the first eight bytes of the firmware’s Git revision. 

Represent it as a hexadecimal string:

public static string DecodeGitHash(ReadOnlySpan<byte> bytes)
{
    return Convert.ToHexString(bytes).ToLowerInvariant();
}
This is especially useful for:

Custom firmware

Development builds

Metadata cache keys

Diagnosing version mismatches

3. Construct a display name
MAVLink does not give you a single guaranteed string such as:

ArduCopter V4.6.2 on CubeOrange+
You generally construct the firmware display name yourself:

public static string BuildFirmwareDisplayName(
    ArduPilotFirmwareFamily family,
    FirmwareVersion? version)
{
    var productName = family switch
    {
        ArduPilotFirmwareFamily.Copter => "ArduCopter",
        ArduPilotFirmwareFamily.Plane => "ArduPlane",
        ArduPilotFirmwareFamily.Rover => "ArduRover",
        ArduPilotFirmwareFamily.Sub => "ArduSub",
        ArduPilotFirmwareFamily.Tracker => "AntennaTracker",
        _ => "Unknown autopilot"
    };

    return version is null
        ? productName
        : $"{productName} {version}";
}
For SITL you would obtain something like:

ArduCopter 4.7.0-dev
depending on the build being run.

Board name is harder
AUTOPILOT_VERSION gives you:

vendor_id
product_id
board_version
uid / uid2
but vendor and product IDs do not automatically produce a human-readable board name unless you maintain a lookup table.

Therefore:

Vehicle firmware name: reliable
Exact board marketing name: not universally reliable
You can provide progressively better identification:

1. Firmware family from HEARTBEAT
2. Firmware version from AUTOPILOT_VERSION
3. Vendor/product IDs from AUTOPILOT_VERSION
4. Board name from a maintained vendor/product mapping
5. Fall back to “ArduPilot board”
Do not use SYSID_THISMAV as a vehicle name. It is only the MAVLink system ID.

Also distinguish this from a user-assigned vehicle name. Classic ArduPilot/MAVLink does not guarantee a general-purpose user-editable vehicle-name string.

Handling slow classic parameter loading
For an FC without MAVFTP, there is no way around transferring approximately 1,400 individual PARAM_VALUE messages. The main gains come from avoiding unnecessary retransmission and reducing packet loss.

The classic protocol is:

PARAM_REQUEST_LIST
        ↓
PARAM_VALUE × parameter count
ArduPilot documents this as its normal parameter retrieval mechanism when MAVFTP is unavailable. 

The correct loading algorithm
Phase 1: Request the complete list once
Send:

PARAM_REQUEST_LIST
Then receive PARAM_VALUE messages and track:

parameterCount
parameterIndex
parameterName
value
type
Use a fixed index array as well as a name dictionary:

private VehicleParameter?[]? parametersByIndex;
private readonly Dictionary<string, VehicleParameter> parametersByName =
    new(StringComparer.Ordinal);
On the first response:

parametersByIndex ??=
    new VehicleParameter?[message.ParameterCount];
On every response:

parametersByIndex[message.ParameterIndex] = parameter;
parametersByName[parameter.Name] = parameter;
Completion becomes:

receivedUniqueCount == expectedCount
not:

receivedMessageCount == expectedCount
Duplicates are normal and must not affect completion.

Phase 2: Repair only missing indexes
After the initial stream becomes quiet—for example 500–1,000 ms without a new unique parameter—calculate the holes:

var missing = parametersByIndex
    .Select((parameter, index) => (parameter, index))
    .Where(x => x.parameter is null)
    .Select(x => x.index)
    .ToArray();
Then request missing values using:

PARAM_REQUEST_READ
param_index = missingIndex
Request by index, not by parameter name.

Index-based repair is preferable because:

You already know which slots are missing.

It avoids name encoding issues.

It handles unknown parameters.

It directly satisfies the missing-index condition.

Do not restart PARAM_REQUEST_LIST merely because 5 or 20 values are missing. That retransmits all 1,400 values.

Use a small repair window
Sending hundreds of repair requests immediately can make the situation worse.

Use a small adaptive window, perhaps:

USB/direct serial: 8–16 outstanding requests
Radio telemetry:   2–4 outstanding requests
Very weak link:    1 outstanding request
Conceptually:

foreach (var batch in missing.Chunk(windowSize))
{
    foreach (var index in batch)
    {
        await RequestParameterByIndexAsync(index, ct);
    }

    await WaitForBatchResponsesAsync(batch, ct);
}
Then repeat only for still-missing indexes.

A good retry policy is:

Initial list request
Quiet-period detection
Repair round 1
Repair round 2
Repair round 3
Finish with partial-result status if gaps remain
Not:

Request the entire list repeatedly until complete
Reduce competing telemetry during parameter download
Your current application requests several streams immediately:

Extra1          10 Hz
Extra2           5 Hz
Position         5 Hz
ExtendedStatus   2 Hz
RawSensors       5 Hz
RC Channels      5 Hz
That is reasonable for the HUD, but it competes with 1,396 parameter responses on a slow serial or telemetry link.

ArduPilot stream rates control how much periodic MAVLink traffic is sent over each connection. 

During initial parameter synchronization, temporarily use a reduced telemetry profile:

Heartbeat: keep
System status: low rate
Position: low rate
Attitude: low rate or temporarily paused
Raw sensors: pause
RC channels: pause
High-frequency extras: pause
After parameter synchronization:

restore normal HUD telemetry rates
Architecturally, I would make this explicit:

public interface IMavLinkBandwidthCoordinator
{
    ValueTask<IAsyncDisposable> AcquireBulkTransferModeAsync(
        VehicleId vehicleId,
        CancellationToken cancellationToken);
}
Usage:

await using var bulkMode =
    await bandwidthCoordinator.AcquireBulkTransferModeAsync(
        vehicleId,
        ct);

var result = await parameterClient.DownloadAllAsync(
    vehicleId,
    ct);
The returned lease restores normal stream rates when disposed, including on cancellation or disconnect.

This is better than letting each bulk operation manipulate stream rates independently.

Cache-first parameter loading
This will make the largest perceived UI improvement.

Key the cache by:

Hardware UID
Firmware family
Firmware version
Git hash, when available
Parameter count
For example:

public sealed record ParameterCacheKey(
    string VehicleUid,
    ArduPilotFirmwareFamily FirmwareFamily,
    FirmwareVersion FirmwareVersion,
    string? GitHash);
On reconnect:

Read cached values immediately.

Display them as Cached or Verifying.

Start background synchronization.

Replace values as live PARAM_VALUE messages arrive.

Mark synchronization complete when all indexes are accounted for.

That changes the user experience from:

Blank editor for 30–90 seconds
to:

Immediate editor with last-known values
Live verification in progress
You must still visually distinguish stale cached values from confirmed live values.

A useful state model:

public enum ParameterSynchronizationState
{
    NoData,
    Cached,
    Downloading,
    RepairingMissing,
    Complete,
    Partial,
    Failed,
    Disconnected
}
And per parameter:

public enum ParameterValueFreshness
{
    Cached,
    Confirmed,
    ModifiedLocally,
    WritePending,
    WriteConfirmed
}
Do not throw away a valid partial download on disconnect
For resilience, retain:

Expected count

Received indexes

Last live values

Missing indexes

Firmware identity

Cache identity

If the same FC reconnects with the same firmware identity, you can display the retained values and begin a fresh reconciliation.

You probably cannot resume the flight controller’s original PARAM_REQUEST_LIST stream itself, but you can avoid losing the useful state already accumulated.

Detect capabilities before choosing a protocol
AUTOPILOT_VERSION.capabilities should drive the parameter transport decision.

Conceptually:

var supportsMavFtp =
    capabilities.HasFlag(
        MavProtocolCapability.Ftp);
The capabilities field is specifically intended to advertise supported protocol features, including capabilities used by ground stations. 

Then:

IParameterTransport transport =
    supportsMavFtp
        ? mavFtpParameterTransport
        : classicParameterTransport;
Do not determine MAVFTP support by trying it and waiting for repeated timeouts on every connection. A single guarded probe may still be useful for buggy firmware, but capability negotiation should be the primary path.

Recommended connection bootstrap order
For your current architecture:

1. Receive HEARTBEAT
2. Register VehicleSession
3. Determine autopilot and MAV_TYPE
4. Request AUTOPILOT_VERSION
5. Create VehicleFirmwareIdentity
6. Load matching cached metadata
7. Load cached parameter values into UI
8. Inspect capabilities
9. Select MAVFTP or classic parameter transport
10. Enter reduced-bandwidth bulk mode
11. Download parameter values
12. Repair missing indexes
13. Restore normal telemetry
14. Persist verified parameter cache
I would not start the full HUD stream profile before step 11 has finished on a low-bandwidth connection.

Practical priority
For MissionPlanner NextGen, I would implement these in this order:

Add AUTOPILOT_VERSION message and decoder.

Request it automatically after heartbeat.

Store VehicleFirmwareIdentity in VehicleSession.

Correct the classic loader to use one list request plus indexed gap repair.

Add reduced telemetry during bulk loading.

Add cache-first UI population.

Later, select version-specific metadata using the firmware identity.

The exact board marketing name can wait. The firmware family, exact firmware version, UID, and capability flags are the information needed immediately for parameter transport, metadata selection, caching, and reconnect resilience.




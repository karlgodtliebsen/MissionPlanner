I have been used SITL ArduPilot, specific the ArduCopter.
That has given me a new insight into Parameters. 

In Ardupilot, when I start the Parameters Editor, I get a list of these with 1396 items, and they all have metadata.

How do they achieve this.


ArduPilot does not normally transmit all that metadata with the 1,396 parameter values.

Mission Planner builds the editor by combining two separate data sources:

Live parameter values from the flight controller

Parameter metadata generated from the matching ArduPilot source code

1. Live values come from MAVLink
When Mission Planner connects, it requests the vehicle’s parameter set using the MAVLink parameter protocol.

Traditionally that means:

PARAM_REQUEST_LIST
    ↓
PARAM_VALUE
PARAM_VALUE
PARAM_VALUE
...
Newer ArduPilot versions may use MAVFTP to retrieve the packed parameter file more efficiently, which is why your SITL console reports:

Received 1396 parameters (ftp)
The transmitted parameter data principally contains:

Parameter name

Current value

MAVLink parameter type

Parameter count

Parameter index

It does not contain rich information such as:

Long description

Display name

Units

Minimum and maximum

Increment

Enumerated value labels

Bitmask meanings

Reboot-required indication

User level

ArduPilot explicitly recommends that a GCS retrieve the actual parameter names and values from the connected flight controller because the available set varies by firmware, vehicle type, build options, and hardware. 

2. Metadata comes from ArduPilot source annotations
The metadata originates in comments attached to parameter definitions inside ArduPilot source files.

A simplified parameter definition looks conceptually like this:

// @Param: RTL_ALT
// @DisplayName: RTL Altitude
// @Description: The minimum altitude the vehicle will climb to before returning home
// @Units: cm
// @Range: 200 8000
// @Increment: 100
// @User: Standard
AP_GROUPINFO("RTL_ALT", 7, ParametersG2, rtl_altitude, 1500),
Other metadata tags include:

@Values
@Bitmask
@RebootRequired
@ReadOnly
@Volatile
@Vehicle
@Frame
These annotations exist in files such as:

ArduCopter/Parameters.cpp
libraries/AP_*/...
ArduCopter’s own parameter declarations are maintained in ArduCopter/Parameters.cpp, while parameters belonging to subsystems such as GPS, EKF, battery monitoring, motors, serial ports and navigation are defined in their respective libraries. 

3. ArduPilot generates metadata files automatically
ArduPilot has a Python generator:

Tools/autotest/param_metadata/param_parse.py
It scans the parameter annotations and emits metadata in several formats, including:

XML

JSON

HTML

Markdown

RST

The script describes its purpose as generating parameter metadata suitable for ground stations and web services. 

For Copter, it can be run approximately as:

./Tools/autotest/param_metadata/param_parse.py --vehicle Copter
One of its important outputs is:

apm.pdef.xml
The same generated data is used by:

Mission Planner

Other GCS applications

ArduPilot parameter documentation pages

Automated validation tooling

ArduPilot explicitly provides these definitions as GCS resources, including descriptions, expected ranges and related information, in multiple formats on its autotest server. 

4. Mission Planner joins values and metadata by parameter name
Conceptually, Mission Planner performs this join:

foreach (var liveParameter in downloadedParameters)
{
    metadata.TryGetValue(
        liveParameter.Name,
        out var parameterMetadata);

    rows.Add(new ParameterEditorRow
    {
        Name = liveParameter.Name,
        Value = liveParameter.Value,
        Type = liveParameter.Type,

        DisplayName = parameterMetadata?.DisplayName,
        Description = parameterMetadata?.Description,
        Units = parameterMetadata?.Units,
        Minimum = parameterMetadata?.Minimum,
        Maximum = parameterMetadata?.Maximum,
        Increment = parameterMetadata?.Increment,
        Values = parameterMetadata?.Values,
        Bitmask = parameterMetadata?.Bitmask,
        RebootRequired = parameterMetadata?.RebootRequired
    });
}
The stable identity is the parameter name:

ARMING_CHECK
BATT_MONITOR
EK3_ENABLE
SERIAL1_PROTOCOL
WPNAV_SPEED
The value comes from the connected vehicle. The explanatory metadata comes from the generated metadata repository.

Why there are exactly 1,396 parameters
That count is the actual parameter set registered by your running ArduCopter SITL build.

It depends on:

Vehicle type: Copter, Plane, Rover, Sub

Firmware version

Enabled features

Frame configuration

Compile-time options

Included libraries

SITL-only parameters

Hardware-specific drivers

The metadata repository may contain more definitions than the connected vehicle exposes.

Mission Planner therefore should not simply show every metadata record. It should normally:

Retrieve the real parameter set from the vehicle.

Look up metadata for each returned parameter.

Display only parameters actually present on that vehicle.

Gracefully display parameters for which metadata is missing.

Firmware-version matching
This is an important design issue for MissionPlanner NextGen.

Metadata changes between firmware versions. A metadata file generated from current ArduPilot master may describe parameters that:

Do not exist in an older stable firmware

Have different valid values

Have changed units or ranges

Have changed descriptions

Have been renamed or removed

A robust repository key would therefore include at least:

public sealed record ParameterMetadataIdentity(
    FirmwareFamily FirmwareFamily,
    Version FirmwareVersion,
    string VehicleType);
For example:

ArduCopter 4.6.x
ArduPlane 4.6.x
Rover 4.6.x
ArduSub 4.5.x
Mission Planner historically obtains and caches generated metadata files for relevant firmware families and versions. The ArduPilot firmware server exposes Mission Planner metadata resources and historical XML files. 

Recommended design for MissionPlanner NextGen
I would keep values and metadata as separate domain concepts.

public sealed record VehicleParameter(
    string Name,
    double Value,
    MavParameterType Type,
    ushort Index,
    ushort Count);
public sealed record ParameterMetadata(
    string Name,
    string? DisplayName,
    string? Description,
    string? Units,
    decimal? Minimum,
    decimal? Maximum,
    decimal? Increment,
    IReadOnlyDictionary<long, string> Values,
    IReadOnlyDictionary<int, string> Bitmask,
    bool RebootRequired,
    bool ReadOnly,
    ParameterUserLevel UserLevel);
Then combine them for presentation:

public sealed record ParameterDefinition(
    VehicleParameter Parameter,
    ParameterMetadata? Metadata);
That distinction matters because:

The vehicle is authoritative for existence, value and wire type.

The metadata repository is authoritative for presentation and validation guidance.

Metadata must never manufacture a parameter that the vehicle did not report.

Missing metadata must not prevent editing a valid live parameter.

Suggested processing pipeline
MAVFTP packed parameter download
            │
            ▼
Live parameter collection
            │
            ├──────────────┐
            │              │
            ▼              ▼
Firmware identity      Metadata provider
AUTOPILOT_VERSION      local cache / bundled / remote
            │              │
            └──────┬───────┘
                   ▼
          Parameter metadata join
                   ▼
          Parameter editor models
For the metadata provider, a resilient lookup order would be:

1. Exact firmware-version metadata in local cache
2. Matching major/minor firmware metadata
3. Bundled fallback metadata
4. Current family metadata from ArduPilot
5. No metadata — still show live parameter
Metadata should not be fetched on every connection
Cache it locally by:

Firmware family

Firmware version

Vehicle type

Metadata format/version

Download timestamp or content hash

The 1,396 parameter values should be refreshed per connection. The metadata usually only needs refreshing when the connected firmware identity changes or the cache is stale.

Bottom line
Mission Planner effectively creates the rich parameter editor using:

MAVLink/MAVFTP live values
              +
ArduPilot-generated XML/JSON metadata
              +
join by parameter name
The flight controller supplies the truth about what parameters exist and their current values.

The generated ArduPilot metadata supplies the human-facing meaning, constraints, units and selectable options.



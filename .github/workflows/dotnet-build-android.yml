name: .NET 10 Android Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    name: Build Android Release
    runs-on: ubuntu-latest
    timeout-minutes: 40

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: microsoft
          java-version: 17

      - name: Set up .NET 10 and .NET MAUI for Android
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x
          workloads: maui-android

      - name: Restore Android application
        run: dotnet restore src/UI/MissionPlanner.Droid/MissionPlanner.Droid.csproj

      - name: Build Android application
        run: >-
          dotnet build
          src/UI/MissionPlanner.Droid/MissionPlanner.Droid.csproj
          --configuration Release
          --framework net10.0-android
          --no-restore

      - name: Upload Android build
        uses: actions/upload-artifact@v7
        with:
          name: MissionPlanner-Android-Release
          path: |
            src/UI/MissionPlanner.Droid/bin/Release/net10.0-android/**/*.apk
            src/UI/MissionPlanner.Droid/bin/Release/net10.0-android/**/*.aab
          if-no-files-found: error
          retention-days: 14
